---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # The name of the PVC
  name: pvc-lustre-1
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      # The real storage capacity in the claim
      storage: 4Ti
  # This field must be the same as the storage class name in StorageClass
  storageClassName: sc.azurelustre.csi.azure.com
